name: Build Costapine ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ALPINE_VERSION: "3.21"
  ARCH: "x86_64"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            squashfs-tools \
            grub-efi-amd64-bin \
            grub-pc-bin \
            mtools \
            syslinux-common \
            isolinux \
            dosfstools \
            cpio \
            rsync \
            wget \
            tar \
            gzip

      - name: Create Build Directories
        run: |
          mkdir -p build/rootfs build/iso_root build/cache output

      - name: Cache Alpine Packages
        uses: actions/cache@v4
        with:
          path: build/cache
          key: alpine-packages-${{ hashFiles('rootfs/packages/*.list') }}
          restore-keys: |
            alpine-packages-

      - name: Bootstrap Alpine Rootfs
        run: |
          wget -q https://dl-cdn.alpinelinux.org/alpine/v3.21/main/x86_64/apk-tools-static-2.14.6-r0.apk
          tar -xzf apk-tools-static-2.14.6-r0.apk
          sudo ./sbin/apk.static \
            --repository http://dl-cdn.alpinelinux.org/alpine/v3.21/main \
            --cache-dir build/cache \
            --timeout 15 \
            --root build/rootfs \
            --initdb \
            --allow-untrusted \
            add alpine-base apk-tools alpine-keys

      - name: Configure Rootfs Repositories
        run: |
          sudo cp rootfs/overlay/etc/apk/repositories build/rootfs/etc/apk/repositories
          sudo cp /etc/resolv.conf build/rootfs/etc/resolv.conf

      - name: Install System Packages
        run: |
          sudo mkdir -p build/rootfs/cache
          sudo mount --bind build/cache build/rootfs/cache
          # Pre-update package index inside rootfs using cache
          sudo chroot build/rootfs apk update --cache-dir /cache --timeout 15
          for f in rootfs/packages/*.list; do
            echo "Installing packages from $f"
            pkgs=$(grep -v '^#' "$f" | grep -v '^$')
            if [ -n "$pkgs" ]; then
              sudo chroot build/rootfs apk add --cache-dir /cache --timeout 15 $pkgs
            fi
          done
          sudo umount build/rootfs/cache || true
          sudo rm -rf build/rootfs/cache

      - name: Apply Rootfs Overlay
        run: |
          sudo cp -a rootfs/overlay/* build/rootfs/

      - name: Configure Services
        run: |
          # Core sysinit services
          sudo chroot build/rootfs rc-update add devfs sysinit
          sudo chroot build/rootfs rc-update add dmesg sysinit
          sudo chroot build/rootfs rc-update add hwdrivers sysinit
          sudo chroot build/rootfs rc-update add sysfs sysinit
          sudo chroot build/rootfs rc-update add cgroups sysinit
          sudo chroot build/rootfs rc-update add udev sysinit || true
          sudo chroot build/rootfs rc-update add udev-trigger sysinit || true
          
          # Core boot services
          sudo chroot build/rootfs rc-update add bootmisc boot
          sudo chroot build/rootfs rc-update add hostname boot
          sudo chroot build/rootfs rc-update add hwclock boot
          sudo chroot build/rootfs rc-update add localmount boot
          sudo chroot build/rootfs rc-update add loopback boot
          sudo chroot build/rootfs rc-update add modules boot
          sudo chroot build/rootfs rc-update add procfs boot
          sudo chroot build/rootfs rc-update add root boot
          sudo chroot build/rootfs rc-update add sysctl boot
          
          # Core default services
          sudo chroot build/rootfs rc-update add dbus default
          sudo chroot build/rootfs rc-update add elogind default
          sudo chroot build/rootfs rc-update add sddm default
          sudo chroot build/rootfs rc-update add networkmanager default
          sudo chroot build/rootfs rc-update add costapine-init default
          
          # Core shutdown services
          sudo chroot build/rootfs rc-update add killprocs shutdown
          sudo chroot build/rootfs rc-update add mount-ro shutdown

      - name: Configure User Accounts
        run: |
          sudo chroot build/rootfs /bin/sh -c '
            adduser -D -s /bin/bash -G wheel costapine
            echo "costapine:costapine" | chpasswd
            echo "root:costapine" | chpasswd
            addgroup costapine video
            addgroup costapine audio
            addgroup costapine input
          '

      - name: Apply Desktop Branding
        run: |
          # JWM config
          sudo mkdir -p build/rootfs/usr/share/jwm
          sudo cp branding/jwm/*.jwmrc build/rootfs/usr/share/jwm/
          sudo cp branding/jwm/autostart.sh build/rootfs/usr/share/jwm/autostart.sh
          sudo chmod +x build/rootfs/usr/share/jwm/autostart.sh

          # SDDM Theme
          sudo mkdir -p build/rootfs/usr/share/sddm/themes/costapine-theme
          sudo cp -a branding/sddm/costapine-theme/* build/rootfs/usr/share/sddm/themes/costapine-theme/

          # Wallpaper & Icons
          sudo mkdir -p build/rootfs/usr/share/backgrounds
          sudo cp branding/wallpapers/costapine-default.png build/rootfs/usr/share/backgrounds/
          sudo mkdir -p build/rootfs/usr/share/pixmaps
          sudo cp branding/icons/costapine-logo.svg build/rootfs/usr/share/pixmaps/

      - name: Install System Installer
        run: |
          sudo mkdir -p build/rootfs/usr/local/bin build/rootfs/usr/local/lib/costapine-installer
          sudo cp installer/costapine-installer.sh build/rootfs/usr/local/bin/
          sudo cp -a installer/lib/* build/rootfs/usr/local/lib/costapine-installer/
          sudo chmod +x build/rootfs/usr/local/bin/costapine-installer.sh
          sudo sed -i 's|SCRIPT_DIR="\$(cd "\$(dirname "\$0")" \&\& pwd)"|SCRIPT_DIR="/usr/local/lib/costapine-installer"|g' build/rootfs/usr/local/bin/costapine-installer.sh

      - name: Cleanup Rootfs Cache
        run: |
          sudo rm -rf build/rootfs/var/cache/apk/*

      - name: Create SquashFS Filesystem
        run: |
          sudo mkdir -p build/iso_root/live
          sudo mksquashfs build/rootfs build/iso_root/live/filesystem.squashfs -comp xz -b 256K

      - name: Build Custom Live Initramfs
        run: |
          sudo mkdir -p ${{ github.workspace }}/build/iso_root/boot
          INIT_STAGE_DIR="${{ github.workspace }}/build/rootfs/tmp/initramfs_tmp"
          sudo mkdir -p "$INIT_STAGE_DIR"
          sudo mkdir -p "$INIT_STAGE_DIR/bin" "$INIT_STAGE_DIR/sbin" "$INIT_STAGE_DIR/etc" "$INIT_STAGE_DIR/proc" "$INIT_STAGE_DIR/sys" "$INIT_STAGE_DIR/dev" "$INIT_STAGE_DIR/mnt" "$INIT_STAGE_DIR/lib"
          
          sudo cp ${{ github.workspace }}/build/rootfs/bin/busybox "$INIT_STAGE_DIR/bin/busybox"
          sudo ln -sf busybox "$INIT_STAGE_DIR/bin/sh"
          
          sudo cp ${{ github.workspace }}/build/rootfs/lib/libc.musl-x86_64.so.1 "$INIT_STAGE_DIR/lib/libc.musl-x86_64.so.1"
          sudo ln -sf libc.musl-x86_64.so.1 "$INIT_STAGE_DIR/lib/ld-musl-x86_64.so.1"
          
          KERNEL_VERSION=$(ls ${{ github.workspace }}/build/rootfs/lib/modules | head -n 1)
          echo "Kernel version found: $KERNEL_VERSION"
          sudo mkdir -p "$INIT_STAGE_DIR/lib/modules/$KERNEL_VERSION"
          
          MODULE_SRC="${{ github.workspace }}/build/rootfs/lib/modules/$KERNEL_VERSION"
          for path in \
              kernel/drivers/block \
              kernel/fs/squashfs \
              kernel/fs/overlayfs \
              kernel/fs/overlay \
              kernel/fs/isofs \
              kernel/fs/nls \
              kernel/drivers/cdrom \
              kernel/drivers/scsi \
              kernel/drivers/ata \
              kernel/drivers/usb/storage \
              kernel/drivers/usb/host \
              kernel/drivers/usb/common \
              kernel/drivers/usb/core \
              kernel/drivers/virtio ; do
            if [ -e "$MODULE_SRC/$path" ]; then
              sudo mkdir -p "$INIT_STAGE_DIR/lib/modules/$KERNEL_VERSION/$(dirname "$path")"
              sudo cp -a "$MODULE_SRC/$path" "$INIT_STAGE_DIR/lib/modules/$KERNEL_VERSION/$path"
            fi
          done
          
          sudo chroot ${{ github.workspace }}/build/rootfs depmod -b /tmp/initramfs_tmp "$KERNEL_VERSION"
          
          sudo cp iso/initramfs/init "$INIT_STAGE_DIR/init"
          sudo chmod +x "$INIT_STAGE_DIR/init"
          
          (cd "$INIT_STAGE_DIR" && sudo find . -print0 | sudo cpio --null -ov --format=newc | gzip -9 > ${{ github.workspace }}/build/iso_root/boot/initramfs-costapine) || \
          (cd "$INIT_STAGE_DIR" && sudo find . | sudo cpio -ov -H newc | gzip -9 > ${{ github.workspace }}/build/iso_root/boot/initramfs-costapine)
          
          sudo rm -rf "$INIT_STAGE_DIR"

      - name: Prepare ISO Boot Directory
        run: |
          sudo cp build/rootfs/boot/vmlinuz-lts build/iso_root/boot/vmlinuz-lts

      - name: Configure Isolinux (BIOS Boot)
        run: |
          sudo mkdir -p build/iso_root/boot/isolinux
          sudo cp iso/syslinux/isolinux.cfg build/iso_root/boot/isolinux/
          for f in isolinux.bin ldlinux.c32 libcom32.c32 libutil.c32 vesamenu.c32 reboot.c32 poweroff.c32; do
            if [ -f "/usr/share/syslinux/$f" ]; then
              sudo cp "/usr/share/syslinux/$f" build/iso_root/boot/isolinux/
            elif [ -f "/usr/lib/syslinux/bios/$f" ]; then
              sudo cp "/usr/lib/syslinux/bios/$f" build/iso_root/boot/isolinux/
            elif [ -f "/usr/lib/syslinux/modules/bios/$f" ]; then
              sudo cp "/usr/lib/syslinux/modules/bios/$f" build/iso_root/boot/isolinux/
            else
              echo "ERROR: Required syslinux file $f not found!"
              exit 1
            fi
          done
          sudo cp branding/splash/costapine-splash.png build/iso_root/boot/isolinux/splash.png

      - name: Configure GRUB (UEFI Boot)
        run: |
          sudo mkdir -p build/iso_root/boot/grub
          sudo cp iso/grub/grub.cfg build/iso_root/boot/grub/grub.cfg
          sudo grub-mkstandalone -d /usr/lib/grub/x86_64-efi -O x86_64-efi \
            -o build/iso_root/boot/grub/BOOTX64.EFI \
            "boot/grub/grub.cfg=iso/grub/grub-embed.cfg"

          # Build FAT ESP image
          mkdir -p /tmp/efi_img/EFI/BOOT
          sudo cp build/iso_root/boot/grub/BOOTX64.EFI /tmp/efi_img/EFI/BOOT/BOOTX64.EFI
          dd if=/dev/zero of=build/iso_root/boot/grub/efiboot.img bs=1M count=16
          mkfs.vfat -F 12 -n 'ESP' build/iso_root/boot/grub/efiboot.img
          mcopy -i build/iso_root/boot/grub/efiboot.img -s /tmp/efi_img/* ::/

      - name: Generate Hybrid ISO
        run: |
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid 'COSTAPINE' \
            -eltorito-boot boot/isolinux/isolinux.bin \
            -eltorito-catalog boot/isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot \
            -e boot/grub/efiboot.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            -output output/costapine-x86_64.iso \
            build/iso_root

      - name: Generate Checksums
        run: |
          sha256sum output/costapine-x86_64.iso > output/costapine-x86_64.iso.sha256

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: costapine-iso
          path: output/costapine-x86_64*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/costapine-x86_64.iso
            output/costapine-x86_64.iso.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
